# Profil test : H2 en mémoire pour les tests sans PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Désactiver Liquibase en test (H2 créé via ddl-auto)
spring.liquibase.enabled=false

# JWT pour les tests
client.secret.jwt=test-secret-key-at-least-64-bytes-for-hs512-algorithm-security
jwt.token.validity=3600000
